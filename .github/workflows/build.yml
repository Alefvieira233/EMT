name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-main:
    name: Build FerramentaEMT (Release)
    runs-on: windows-latest
    env:
      # Sinaliza pro csproj usar PackageReference Nice3point em vez do
      # HintPath local do Revit 2025. Ver docs/ADR/ADR-005-ci-revit-stubs.md.
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Show .NET info
        run: dotnet --info

      - name: Restore FerramentaEMT
        working-directory: FerramentaEMT
        run: dotnet restore FerramentaEMT.csproj

      - name: Build FerramentaEMT (Release)
        working-directory: FerramentaEMT
        run: dotnet build FerramentaEMT.csproj --configuration Release --no-restore

  build-tests:
    name: Build & Test FerramentaEMT.Tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Tests
        working-directory: FerramentaEMT.Tests
        run: dotnet restore

      - name: Build Tests
        working-directory: FerramentaEMT.Tests
        run: dotnet build --configuration Release --no-restore

      - name: Run Tests
        working-directory: FerramentaEMT.Tests
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: FerramentaEMT.Tests/TestResults/

  lint:
    name: Code Quality (dotnet format)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify formatting (Tests project)
        working-directory: FerramentaEMT.Tests
        run: dotnet format --verify-no-changes --verbosity diagnostic
        continue-on-error: true   # WARNING ONLY for now; flip to fail later
